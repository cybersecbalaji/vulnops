# VulnOps — Fly.io deployment config
# fly launch --config deploy/fly.toml
#
# Prerequisites:
#   fly auth login
#   fly postgres create --name vulnops-db
#   fly redis create --name vulnops-redis   (Upstash via Fly)
#
# Required secrets (set via fly secrets set KEY=value):
#   JWT_PRIVATE_KEY      — from backend/.env (after running setup.py)
#   JWT_PUBLIC_KEY       — same
#   MASTER_ENCRYPTION_KEY — same
#   DATABASE_URL         — from `fly postgres attach vulnops-db`
#   REDIS_URL            — from `fly redis status vulnops-redis`
#   CORS_ORIGINS         — ["https://your-frontend.vercel.app"]

app = "vulnops-api"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  APP_ENV = "production"
  DEBUG = "false"
  SCHEDULER_ENABLED = "false"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[deploy]
  release_command = "alembic upgrade head"

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    hard_limit = 50
    soft_limit = 25

  [[services.http_checks]]
    path = "/ready"
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
