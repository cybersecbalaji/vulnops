# VulnOps Triage Console — local development stack
# PostgreSQL 16 + Redis 7 + backend + frontend
#
# Usage:
#   docker compose up -d db redis       # infra only
#   docker compose up -d                # full stack
#   docker compose exec backend alembic upgrade head   # run migrations
#
# IMPORTANT: Copy backend/.env.example → backend/.env and fill in secrets
# before starting the full stack.

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: vulnops_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vulnops
      POSTGRES_PASSWORD: changeme          # Override in production via secrets
      POSTGRES_DB: vulnops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vulnops -d vulnops"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vulnops_redis
    restart: unless-stopped
    command: >
      redis-server
        --appendonly yes
        --appendfsync everysec
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vulnops_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://vulnops:changeme@db:5432/vulnops
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app         # Live reload in development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Next.js frontend ───────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: vulnops_frontend
    working_dir: /app
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules      # Prevent host node_modules from overriding
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
